<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community - AgentSquid</title>
  <link rel="icon" type="image/png" href="agent_squid_400.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" />
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #13131c;
      --surface-2: #1e1e28;
      --surface-3: #1a1a24;
      --raised: #2a2a35;
      --border: #2e2e3e;
      --border-faint: #141420;
      --text: #e8e4dc;
      --text-muted: #aaa;
      --text-mid: #888;
      --text-lo: #666;
      --text-dim: #555;
      --accent: #f07040;
      --accent-dim: #d07840;
      --accent-light: #f5a060;
      --ok: #4a8a4a;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: #2a2a40 transparent;
    }

    *::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    *::-webkit-scrollbar-track {
      background: transparent;
    }

    *::-webkit-scrollbar-thumb {
      background: #2a2a40;
      border-radius: 3px;
    }

    html, body {
      min-height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 58% 42% at 50% 4%, rgba(240, 112, 64, 0.13), transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    a {
      color: inherit;
    }

    .container {
      width: 100%;
      max-width: 860px;
      padding: 2rem 1rem 3rem;
    }

    .page-header {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding-bottom: 0.9rem;
      margin-bottom: 1.2rem;
      border-bottom: 1px solid var(--surface-3);
    }

    .logo-mark {
      width: 34px;
      height: 34px;
      border: 2px solid rgba(240, 112, 64, 0.45);
      border-radius: 50%;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .logo-mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.1);
    }

    .brand-title {
      color: var(--accent);
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .back-link {
      margin-left: auto;
      border: 1px solid #222;
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.28rem 0.55rem;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }

    .back-link:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .intro {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .section-heading {
      color: var(--text);
      font-size: clamp(1.2rem, 3vw, 1.65rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .cache-pill {
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-lo);
      display: inline-flex;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.68rem;
      gap: 0.45rem;
      padding: 0.38rem 0.65rem;
      white-space: nowrap;
    }

    .cache-dot {
      width: 0.45rem;
      height: 0.45rem;
      background: var(--ok);
      border-radius: 50%;
      box-shadow: 0 0 0 4px rgba(74, 138, 74, 0.1);
    }

    .feed-shell {
      border-top: 1px solid var(--surface-3);
      min-height: 22rem;
      padding-top: 0.85rem;
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 0.72rem;
    }

    .feed-item {
      --item-accent: var(--accent);
      display: grid;
      grid-template-columns: 2rem minmax(0, 1fr);
      gap: 0.65rem;
    }

    .source-avatar {
      width: 2rem;
      height: 2rem;
      align-items: center;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--item-accent);
      display: flex;
      flex-shrink: 0;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.76rem;
      font-weight: 700;
      justify-content: center;
      margin-top: 0.1rem;
    }

    .post-card {
      background: var(--surface-2);
      border: 1px solid rgba(46, 46, 62, 0.78);
      border-radius: 8px;
      color: var(--text);
      min-width: 0;
      overflow: hidden;
    }

    .post-card:hover {
      border-color: rgba(240, 112, 64, 0.28);
    }

    .post-body {
      padding: 0.72rem 0.82rem;
    }

    .post-meta {
      align-items: baseline;
      display: flex;
      gap: 0.45rem;
      margin-bottom: 0.45rem;
      min-width: 0;
    }

    .source-name {
      color: var(--item-accent);
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .post-time,
    .post-author {
      color: var(--text-dim);
      font-size: 0.72rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .post-text {
      color: var(--text-muted);
      font-size: 0.93rem;
      line-height: 1.55;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .post-text.is-collapsible {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 6;
      overflow: hidden;
    }

    .post-text.is-expanded {
      display: block;
      -webkit-line-clamp: unset;
      overflow: visible;
    }

    .post-text a {
      color: var(--accent-light);
      text-decoration: none;
    }

    .post-text a:hover {
      text-decoration: underline;
    }

    .post-more {
      background: transparent;
      border: 0;
      color: var(--accent-light);
      cursor: pointer;
      display: none;
      font: inherit;
      font-size: 0.76rem;
      font-weight: 700;
      margin-top: 0.42rem;
      padding: 0;
    }

    .post-more.is-visible {
      display: inline-flex;
    }

    .post-more:hover {
      color: var(--accent);
    }

    .post-media {
      background: #111118;
      border-top: 1px solid rgba(46, 46, 62, 0.62);
      display: block;
      overflow: hidden;
    }

    .post-media img {
      display: block;
      width: 100%;
      max-height: 420px;
      object-fit: cover;
    }

    .post-actions {
      align-items: center;
      border-top: 1px solid rgba(46, 46, 62, 0.62);
      display: flex;
      gap: 0.7rem;
      justify-content: space-between;
      padding: 0.5rem 0.82rem;
    }

    .engagement {
      color: var(--text-dim);
      display: flex;
      flex-wrap: wrap;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.68rem;
      gap: 0.55rem;
    }

    .post-link {
      color: var(--text-mid);
      flex: 0 0 auto;
      font-size: 0.74rem;
      font-weight: 700;
      text-decoration: none;
    }

    .post-link:hover {
      color: var(--accent-light);
    }

    .feed-state {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-mid);
      font-size: 0.86rem;
      line-height: 1.6;
      padding: 0.9rem 1rem;
    }

    .feed-state a {
      color: var(--accent-light);
      font-weight: 700;
      text-decoration: none;
    }

    .loader {
      display: inline-flex;
      gap: 4px;
      padding-left: 0.25rem;
      vertical-align: middle;
    }

    .loader span {
      width: 6px;
      height: 6px;
      background: var(--text-dim);
      border-radius: 50%;
      opacity: 0.3;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .loader span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loader span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }

    body.embed-mode {
      background: transparent;
      min-height: auto;
    }

    body.embed-mode::before,
    body.embed-mode .page-header,
    body.embed-mode .intro {
      display: none;
    }

    body.embed-mode .container {
      padding: 0.75rem 0.5rem 1.5rem;
    }

    body.embed-mode .feed-shell {
      border-top: 0;
      padding-top: 0;
    }

    @media (max-width: 640px) {
      .container {
        padding: 1rem 0.75rem 2rem;
      }

      .page-header {
        margin-bottom: 1rem;
      }

      .intro {
        align-items: start;
        flex-direction: column;
      }

      .cache-pill {
        justify-self: start;
      }

      .feed-item {
        grid-template-columns: 1.65rem minmax(0, 1fr);
        gap: 0.5rem;
      }

      .source-avatar {
        width: 1.65rem;
        height: 1.65rem;
        border-radius: 7px;
        font-size: 0.68rem;
      }

      .post-body,
      .post-actions {
        padding-left: 0.68rem;
        padding-right: 0.68rem;
      }

      .post-text {
        font-size: 0.88rem;
      }

      .post-text.is-collapsible {
        -webkit-line-clamp: 5;
      }

      .post-actions {
        align-items: flex-start;
        flex-direction: column;
        gap: 0.42rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <div class="logo-mark">
        <img src="agent_squid_400.png" alt="AgentSquid" />
      </div>
      <div class="brand-title">AgentSquid</div>
      <a class="back-link" href="index.html">Home</a>
    </header>

    <section class="intro" aria-labelledby="community-heading">
      <h1 class="section-heading" id="community-heading">Community</h1>
      <div class="cache-pill" id="cache-pill">
        <span class="cache-dot" aria-hidden="true"></span>
        <span id="cache-label">Cache loading</span>
      </div>
    </section>

    <main class="feed-shell" aria-live="polite">
      <div class="feed-state" id="feed-state">
        Loading cached posts
        <span class="loader" aria-hidden="true"><span></span><span></span><span></span></span>
      </div>
      <div class="feed" id="feed" hidden></div>
    </main>
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(location.search);
      if (params.has('embed')) {
        document.body.classList.add('embed-mode');
        if (params.get('bg') === 'transparent') {
          document.body.style.background = 'transparent';
        }
      }
    })();
  </script>

  <script>
    (function() {
      var feed = document.getElementById('feed');
      var state = document.getElementById('feed-state');
      var cacheLabel = document.getElementById('cache-label');
      var allItems = [];

      Promise.allSettled([
        fetchJson('x-posts.json').then(normalizeXCache),
        fetchJson('curator-posts.json').then(normalizeCuratorCache)
      ]).then(function(results) {
        var caches = results
          .filter(function(result) { return result.status === 'fulfilled'; })
          .map(function(result) { return result.value; });

        allItems = caches
          .reduce(function(items, cache) { return items.concat(cache.items); }, [])
          .sort(compareItems)
          .slice(0, 60);

        updateCacheLabel(caches);

        if (!allItems.length) {
          showEmpty();
          return;
        }

        renderFeed();
      }).catch(function() {
        showEmpty();
      });

      function fetchJson(url) {
        return fetch(url, { cache: 'no-cache' }).then(function(response) {
          if (!response.ok) {
            throw new Error(url + ' returned ' + response.status);
          }
          return response.json();
        });
      }

      function normalizeXCache(cache) {
        var posts = Array.isArray(cache.posts) ? cache.posts : [];
        return {
          source: 'x',
          updatedAt: cache.updated_at || null,
          items: posts.map(function(post) {
            return {
              id: 'x-' + post.id,
              source: 'x',
              sourceLabel: 'X',
              avatarLabel: 'X',
              accent: '#f07040',
              author: '@aiAgentSquid',
              createdAt: post.created_at || null,
              text: post.text || '',
              url: post.url || ('https://x.com/aiAgentSquid/status/' + post.id),
              entities: post.entities || null,
              engagement: null,
              media: null
            };
          })
        };
      }

      function normalizeCuratorCache(cache) {
        var posts = Array.isArray(cache.posts) ? cache.posts : [];
        return {
          source: 'curator',
          updatedAt: cache.updated_at || null,
          items: posts.map(function(post) {
            var network = post.network_name || 'Community';
            var media = post.media || {};
            var engagement = post.engagement || {};
            return {
              id: 'curator-' + post.id,
              source: 'curator',
              sourceLabel: network,
              avatarLabel: network.slice(0, 1).toUpperCase(),
              accent: sourceColor(network),
              author: authorName(post),
              createdAt: post.created_at || null,
              text: post.text || '',
              url: post.url || null,
              entities: null,
              engagement: engagement,
              media: media.image_large || media.image || media.thumbnail || null
            };
          })
        };
      }

      function renderFeed() {
        var fragment = document.createDocumentFragment();
        allItems.forEach(function(item) {
          fragment.appendChild(renderItem(item));
        });

        feed.replaceChildren(fragment);
        feed.hidden = false;
        state.hidden = true;
        requestAnimationFrame(updateExpandablePosts);
      }

      function renderItem(item) {
        var wrapper = document.createElement('article');
        wrapper.className = 'feed-item';
        wrapper.dataset.source = item.source;
        wrapper.style.setProperty('--item-accent', item.accent);

        var avatar = document.createElement('div');
        avatar.className = 'source-avatar';
        avatar.textContent = item.avatarLabel;
        wrapper.appendChild(avatar);

        var card = document.createElement('div');
        card.className = 'post-card';

        if (item.media) {
          var mediaLink = item.url ? document.createElement('a') : document.createElement('div');
          mediaLink.className = 'post-media';
          if (item.url) {
            mediaLink.href = item.url;
            mediaLink.target = '_blank';
            mediaLink.rel = 'noopener';
          }

          var image = document.createElement('img');
          image.src = item.media;
          image.alt = '';
          image.loading = 'lazy';
          mediaLink.appendChild(image);
          card.appendChild(mediaLink);
        }

        var body = document.createElement('div');
        body.className = 'post-body';

        var meta = document.createElement('div');
        meta.className = 'post-meta';
        appendTextSpan(meta, 'source-name', item.sourceLabel);
        appendTextSpan(meta, 'post-time', formatRelativeTime(item.createdAt));
        if (item.author) {
          appendTextSpan(meta, 'post-author', item.author);
        }
        body.appendChild(meta);

        var text = document.createElement('div');
        text.className = 'post-text';
        appendLinkedText(text, item.text, item.entities);
        body.appendChild(text);

        var more = document.createElement('button');
        more.className = 'post-more';
        more.type = 'button';
        more.textContent = 'Show more';
        more.setAttribute('aria-expanded', 'false');
        more.addEventListener('click', function() {
          var expanded = text.classList.toggle('is-expanded');
          more.textContent = expanded ? 'Show less' : 'Show more';
          more.setAttribute('aria-expanded', String(expanded));
        });
        body.appendChild(more);

        card.appendChild(body);

        var actions = document.createElement('div');
        actions.className = 'post-actions';

        var engagement = document.createElement('div');
        engagement.className = 'engagement';
        appendEngagement(engagement, item.engagement);
        actions.appendChild(engagement);

        if (item.url) {
          var link = document.createElement('a');
          link.className = 'post-link';
          link.href = item.url;
          link.target = '_blank';
          link.rel = 'noopener';
          link.textContent = 'Open post';
          actions.appendChild(link);
        }

        card.appendChild(actions);
        wrapper.appendChild(card);
        return wrapper;
      }

      function updateExpandablePosts() {
        Array.prototype.slice.call(feed.querySelectorAll('.post-text')).forEach(function(text) {
          var more = text.nextElementSibling;
          if (!more || !more.classList.contains('post-more')) return;

          text.classList.add('is-collapsible');

          if (text.scrollHeight > text.clientHeight + 1) {
            more.classList.add('is-visible');
          } else {
            text.classList.remove('is-collapsible');
            more.remove();
          }
        });
      }

      function appendLinkedText(parent, text, entities) {
        var urls = entities && Array.isArray(entities.urls) ? entities.urls : [];
        var replacements = urls
          .filter(function(url) { return url.url; })
          .sort(function(a, b) { return b.url.length - a.url.length; });

        var remaining = String(text || '');
        if (!remaining) {
          parent.textContent = 'No text available.';
          return;
        }

        replacements.forEach(function(url) {
          remaining = remaining.replace(url.url, url.expanded_url || url.display_url || url.url);
        });

        var matcher = /(https?:\/\/[^\s]+)/g;
        var lastIndex = 0;
        var match;
        while ((match = matcher.exec(remaining))) {
          if (match.index > lastIndex) {
            parent.appendChild(document.createTextNode(remaining.slice(lastIndex, match.index)));
          }
          var link = document.createElement('a');
          link.href = match[0];
          link.target = '_blank';
          link.rel = 'noopener';
          link.textContent = match[0].replace(/^https?:\/\//, '');
          parent.appendChild(link);
          lastIndex = matcher.lastIndex;
        }

        if (lastIndex < remaining.length) {
          parent.appendChild(document.createTextNode(remaining.slice(lastIndex)));
        }
      }

      function appendEngagement(parent, engagement) {
        if (!engagement) {
          appendTextSpan(parent, '', 'cached');
          return;
        }

        var bits = [];
        if (Number.isFinite(engagement.likes)) bits.push(formatCount(engagement.likes) + ' likes');
        if (Number.isFinite(engagement.comments)) bits.push(formatCount(engagement.comments) + ' comments');
        if (Number.isFinite(engagement.views)) bits.push(formatCount(engagement.views) + ' views');

        if (!bits.length) {
          bits.push('cached');
        }

        bits.forEach(function(bit) {
          appendTextSpan(parent, '', bit);
        });
      }

      function updateCacheLabel(caches) {
        var dates = caches
          .map(function(cache) { return cache.updatedAt ? new Date(cache.updatedAt) : null; })
          .filter(function(date) { return date && !Number.isNaN(date.getTime()); })
          .sort(function(a, b) { return b - a; });

        cacheLabel.textContent = dates.length
          ? 'Updated ' + formatRelativeTime(dates[0].toISOString())
          : 'Updates every 4h';
      }

      function showEmpty() {
        cacheLabel.textContent = 'Updates every 4h';
        feed.hidden = true;
        state.hidden = false;
        state.textContent = 'Cached posts are not available yet.';
      }

      function authorName(post) {
        var user = post.user || {};
        if (user.screen_name) return '@' + user.screen_name;
        return user.full_name || null;
      }

      function sourceColor(network) {
        var key = String(network || '').toLowerCase();
        if (key.includes('reddit')) return '#ff875f';
        if (key.includes('instagram')) return '#f5a060';
        if (key.includes('tiktok')) return '#c678dd';
        return '#d07840';
      }

      function compareItems(a, b) {
        var aTime = Date.parse(a.createdAt || '') || 0;
        var bTime = Date.parse(b.createdAt || '') || 0;
        return bTime - aTime;
      }

      function formatRelativeTime(value) {
        var date = new Date(value);
        if (!value || Number.isNaN(date.getTime())) return 'cached';

        var deltaSeconds = Math.round((Date.now() - date.getTime()) / 1000);
        var abs = Math.abs(deltaSeconds);
        var units = [
          ['year', 31536000],
          ['month', 2592000],
          ['week', 604800],
          ['day', 86400],
          ['hour', 3600],
          ['minute', 60]
        ];

        for (var i = 0; i < units.length; i += 1) {
          var unit = units[i][0];
          var seconds = units[i][1];
          if (abs >= seconds) {
            return new Intl.RelativeTimeFormat('en', { numeric: 'auto' }).format(
              -Math.round(deltaSeconds / seconds),
              unit
            );
          }
        }

        return 'just now';
      }

      function formatCount(value) {
        return new Intl.NumberFormat('en', { notation: 'compact' }).format(value);
      }

      function appendTextSpan(parent, className, text) {
        var span = document.createElement('span');
        if (className) span.className = className;
        span.textContent = text;
        parent.appendChild(span);
      }

    })();
  </script>
</body>
</html>
