<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community - AgentSquid</title>
  <link rel="icon" type="image/png" href="agent_squid_400.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" />
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #13131c;
      --surface-2: #1e1e28;
      --surface-3: #1a1a24;
      --raised: #2a2a35;
      --border: #2e2e3e;
      --border-faint: #141420;
      --text: #e8e4dc;
      --text-muted: #aaa;
      --text-mid: #888;
      --text-lo: #666;
      --text-dim: #555;
      --accent: #f07040;
      --accent-dim: #d07840;
      --accent-light: #f5a060;
      --ok: #4a8a4a;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: #2a2a40 transparent;
    }

    *::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    *::-webkit-scrollbar-track {
      background: transparent;
    }

    *::-webkit-scrollbar-thumb {
      background: #2a2a40;
      border-radius: 3px;
    }

    html, body {
      min-height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rubik', system-ui, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 58% 42% at 50% 4%, rgba(240, 112, 64, 0.13), transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    a {
      color: inherit;
    }

    .container {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      padding: 1.4rem 1rem 3rem;
    }

    .page-header {
      display: flex;
      align-items: center;
      background: rgba(15, 15, 19, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      gap: 1rem;
      justify-content: space-between;
      padding: 0.9rem 2.5rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      align-items: center;
      color: var(--text);
      display: flex;
      gap: 0.65rem;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .logo-mark {
      width: 34px;
      height: 34px;
      background: radial-gradient(circle at 50% 45%, rgba(245, 160, 96, 0.22) 0%, rgba(208, 106, 58, 0.12) 60%, rgba(208, 106, 58, 0.04) 100%);
      border: 2px solid rgba(240, 112, 64, 0.45);
      border-radius: 50%;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .logo-mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.1);
    }

    .brand-title {
      color: var(--accent);
      font-family: 'Rubik', system-ui, sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0;
    }

    .nav-links {
      align-items: center;
      display: flex;
      gap: 1rem;
    }

    .nav-links a {
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--text);
    }

    .nav-links .install {
      background: var(--accent);
      border-radius: 7px;
      color: #fff;
      padding: 0.48rem 0.85rem;
    }

    .nav-links .install:hover {
      background: #de6235;
      color: #fff;
    }

    .mobile-page-title {
      display: none;
    }

    .nav-burger {
      display: none;
    }

    .intro {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 1rem;
      margin-bottom: 0.3rem;
    }

    .intro-actions {
      align-items: center;
      display: flex;
      gap: 0.5rem;
      justify-content: space-between;
      width: 100%;
    }

    .cache-pill,
    .user-group-pill {
      align-items: center;
      display: inline-flex;
      font-size: 0.72rem;
      white-space: nowrap;
    }

    .cache-pill {
      color: var(--text-dim);
      gap: 0.45rem;
      min-height: 28px;
      padding: 0;
    }

    .user-group {
      align-items: center;
      display: inline-flex;
      gap: 0.45rem;
    }

    .user-group .community-badge-label {
      color: var(--accent-dim);
      font-size: 0.72rem;
      font-weight: 600;
    }

    .user-group-links {
      align-items: center;
      display: inline-flex;
      gap: 0.4rem;
    }

    .user-group-pill {
      background: #1c1a18;
      border: 1px solid #3a3028;
      border-radius: 6px;
      color: var(--text-muted);
      font-weight: 600;
      gap: 0.35rem;
      line-height: 1.2;
      min-height: 28px;
      padding: 0 0.65rem;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .user-group-pill:hover {
      border-color: #6a5040;
      color: var(--text);
    }

    .user-group-icon {
      display: inline-flex;
      flex: none;
      height: 14px;
      width: 14px;
    }

    .user-group-icon svg {
      display: block;
      height: 100%;
      width: 100%;
    }

    .cache-dot {
      width: 0.45rem;
      height: 0.45rem;
      background: var(--ok);
      border-radius: 50%;
      box-shadow: 0 0 0 4px rgba(74, 138, 74, 0.1);
    }

    .feed-shell {
      border-top: 1px solid var(--surface-3);
      min-height: 22rem;
      padding-top: 0.4rem;
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 0.72rem;
    }

    .load-more {
      align-items: center;
      align-self: center;
      background: #1c1a18;
      border: 1px solid #3a3028;
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      display: inline-flex;
      font-size: 0.72rem;
      font-weight: 600;
      justify-content: center;
      line-height: 1.2;
      margin: 1rem auto 0;
      min-height: 32px;
      padding: 0 0.85rem;
      transition: border-color 0.15s, color 0.15s;
    }

    .load-more[hidden] {
      display: none;
    }

    .load-more:hover {
      border-color: #6a5040;
      color: var(--text);
    }

    .feed-item {
      --item-accent: var(--accent);
      display: block;
    }

    .post-card {
      background: var(--surface-2);
      border: 1px solid rgba(46, 46, 62, 0.78);
      border-radius: 8px;
      color: var(--text);
      min-width: 0;
      overflow: hidden;
    }

    .post-card.has-media {
      align-items: start;
      display: grid;
      grid-template-columns: minmax(136px, 26%) minmax(0, 1fr);
    }

    .post-card:hover {
      border-color: rgba(240, 112, 64, 0.28);
    }

    .post-body {
      padding: 0.72rem 0.82rem;
    }

    .post-meta {
      align-items: center;
      display: flex;
      gap: 0.4rem;
      margin-bottom: 0.45rem;
      min-width: 0;
    }

    .service-icon {
      align-items: center;
      color: var(--text);
      display: inline-flex;
      flex: 0 0 auto;
      height: 1rem;
      justify-content: center;
      width: 1rem;
    }

    .service-icon svg {
      display: block;
      height: 1rem;
      width: 1rem;
    }

    .service-icon-x svg {
      height: 0.9rem;
      width: 0.9rem;
    }

    .service-icon-tiktok {
      height: 1.18rem;
      width: 1.18rem;
    }

    .service-icon-tiktok svg {
      height: 1.18rem;
      transform: scale(1.16);
      transform-origin: center;
      width: 1.18rem;
    }

    .source-name {
      color: var(--item-accent);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .post-time,
    .post-author {
      color: var(--text-dim);
      font-size: 0.72rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .post-author {
      color: var(--accent-light);
      font-weight: 700;
    }

    .pinned-badge {
      align-items: center;
      color: var(--accent-dim);
      display: inline-flex;
      flex: 0 0 auto;
      justify-content: center;
      margin-left: auto;
      min-height: 1rem;
      padding: 0;
    }

    .pinned-badge svg {
      display: block;
      height: 0.78rem;
      width: 0.72rem;
    }

    .community-badge + .pinned-badge,
    .pinned-badge + .post-link {
      margin-left: 0;
    }

    a.post-author {
      text-decoration: none;
    }

    a.post-author:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    .community-badge {
      align-items: center;
      border: 1px solid rgba(245, 160, 96, 0.38);
      border-radius: 999px;
      color: var(--accent-light);
      display: inline-flex;
      flex: 0 0 auto;
      font-size: 0.68rem;
      font-weight: 700;
      gap: 0.22rem;
      line-height: 1;
      margin-left: auto;
      padding: 0.23rem 0.45rem;
      text-decoration: none;
      white-space: nowrap;
    }

    .community-badge + .post-link {
      margin-left: 0;
    }

    .community-badge-mobile {
      display: none;
    }

    .community-badge:hover {
      border-color: rgba(245, 160, 96, 0.74);
      color: var(--accent);
    }

    .community-badge-label {
      color: var(--text-mid);
      font-weight: 600;
    }

    .post-text {
      color: var(--text-muted);
      font-size: 0.93rem;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .post-title {
      color: var(--text);
      display: inline-block;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.28;
      margin-bottom: 0.55rem;
      text-decoration: none;
    }

    .post-title:hover {
      color: var(--accent-light);
    }

    .post-text-paragraph {
      display: block;
      margin: 0;
      white-space: pre-wrap;
    }

    .post-text-paragraph + .post-text-paragraph {
      margin-top: 0.72rem;
    }

    .post-md-heading {
      color: var(--text);
      font-size: 0.98rem;
      line-height: 1.32;
      margin: 1rem 0 0.38rem;
    }

    .post-md-heading:first-child {
      margin-top: 0;
    }

    .post-md-list {
      margin: 0.5rem 0 0.5rem 1.15rem;
      padding: 0;
    }

    .post-md-list li + li {
      margin-top: 0.24rem;
    }

    .post-md-code {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 4px;
      color: var(--text);
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.86em;
      padding: 0.05rem 0.22rem;
    }

    .post-text.is-collapsible {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 6;
      overflow: hidden;
    }

    .post-text.is-expanded {
      display: block;
      -webkit-line-clamp: unset;
      overflow: visible;
    }

    .post-text a {
      color: var(--accent-light);
      text-decoration: none;
    }

    .post-text a:hover {
      text-decoration: underline;
    }

    .post-more {
      background: transparent;
      border: 0;
      color: var(--accent-light);
      cursor: pointer;
      display: none;
      font: inherit;
      font-size: 0.76rem;
      font-weight: 700;
      margin-top: 0.42rem;
      padding: 0;
    }

    .post-more.is-visible {
      display: inline-flex;
    }

    .post-more:hover {
      color: var(--accent);
    }

    .post-media {
      align-self: start;
      background: #111118;
      border: 0;
      border-right: 1px solid rgba(46, 46, 62, 0.62);
      color: inherit;
      cursor: zoom-in;
      display: block;
      font: inherit;
      min-height: 172px;
      overflow: hidden;
      padding: 0;
      position: relative;
      text-align: left;
      width: 100%;
    }

    .post-media:focus-visible {
      outline: 2px solid var(--accent-light);
      outline-offset: -2px;
    }

    .post-media img,
    .post-media video,
    .post-media iframe {
      display: block;
      height: 100%;
      width: 100%;
    }

    .post-media img {
      aspect-ratio: 4 / 3;
      object-fit: cover;
    }

    .post-media.is-portrait img,
    .post-media.is-portrait .media-placeholder {
      aspect-ratio: 9 / 16;
      max-height: 320px;
    }

    .post-media:hover img {
      transform: scale(1.025);
    }

    .post-media img {
      transition: transform 0.18s ease;
    }

    .media-placeholder {
      align-items: center;
      aspect-ratio: 4 / 3;
      background: #0b0b10;
      color: var(--text-dim);
      display: flex;
      justify-content: center;
      min-height: 172px;
    }

    .media-play {
      align-items: center;
      background: rgba(9, 9, 13, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      color: #fff;
      display: inline-flex;
      height: 2.7rem;
      justify-content: center;
      left: 50%;
      pointer-events: none;
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 2.7rem;
    }

    .media-play svg {
      display: block;
      height: 1.15rem;
      margin-left: 0.12rem;
      width: 1.15rem;
    }

    .media-expand {
      align-items: center;
      background: rgba(9, 9, 13, 0.68);
      border-radius: 999px;
      bottom: 0.55rem;
      color: rgba(255, 255, 255, 0.9);
      display: inline-flex;
      height: 1.8rem;
      justify-content: center;
      pointer-events: none;
      position: absolute;
      right: 0.55rem;
      width: 1.8rem;
    }

    .media-expand svg {
      display: block;
      height: 0.92rem;
      width: 0.92rem;
    }

    .post-link {
      align-items: center;
      color: var(--text-mid);
      display: inline-flex;
      flex: 0 0 auto;
      height: 1.35rem;
      justify-content: center;
      margin-left: auto;
      text-decoration: none;
      width: 1.35rem;
    }

    .post-link:hover {
      color: var(--accent-light);
    }

    .post-link svg {
      display: block;
      height: 0.9rem;
      width: 0.9rem;
    }

    .feed-state {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-mid);
      font-size: 0.86rem;
      line-height: 1.6;
      padding: 0.9rem 1rem;
    }

    .feed-state a {
      color: var(--accent-light);
      font-weight: 700;
      text-decoration: none;
    }

    body.media-viewer-open {
      overflow: hidden;
    }

    .media-viewer {
      align-items: center;
      background: rgba(7, 7, 10, 0.82);
      display: flex;
      inset: 0;
      justify-content: center;
      padding: 1rem;
      position: fixed;
      z-index: 20;
    }

    .media-viewer[hidden] {
      display: none;
    }

    .viewer-panel {
      background: #14141d;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 8px;
      display: grid;
      grid-template-columns: minmax(280px, 1fr) minmax(240px, 320px);
      height: min(82dvh, 760px);
      max-height: calc(100dvh - 2rem);
      max-width: 980px;
      overflow: hidden;
      width: min(100%, 980px);
    }

    .viewer-panel.is-text-primary {
      grid-template-columns: 1fr;
      grid-template-rows: minmax(160px, 34%) minmax(0, 1fr);
      max-width: 760px;
    }

    .viewer-stage {
      align-items: center;
      background: #08080c;
      display: flex;
      height: 100%;
      justify-content: center;
      min-height: 0;
      overflow: hidden;
    }

    .viewer-stage img,
    .viewer-stage video,
    .viewer-stage iframe {
      border: 0;
      display: block;
      max-height: 100%;
      max-width: 100%;
    }

    .viewer-stage img,
    .viewer-stage video {
      height: auto;
      object-fit: contain;
      width: auto;
    }

    .viewer-stage iframe {
      aspect-ratio: 9 / 16;
      height: min(82dvh, 760px);
      width: min(100%, 430px);
    }

    .viewer-panel.is-text-primary .viewer-stage {
      height: 100%;
      order: 1;
    }

    .viewer-details {
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      padding: 0.86rem;
    }

    .viewer-panel.is-text-primary .viewer-details {
      border-left: 0;
      border-right: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      min-height: 0;
      order: 2;
      overflow: hidden;
    }

    .viewer-details > div {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .viewer-details .post-text {
      min-height: 0;
      overflow: auto;
    }

    .viewer-close {
      align-items: center;
      background: rgba(20, 20, 29, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      height: 2.1rem;
      justify-content: center;
      position: fixed;
      right: 1rem;
      top: 1rem;
      width: 2.1rem;
      z-index: 21;
    }

    .viewer-close:hover {
      color: var(--accent-light);
    }

    .viewer-close svg {
      display: block;
      height: 1rem;
      width: 1rem;
    }

    .loader {
      display: inline-flex;
      gap: 4px;
      padding-left: 0.25rem;
      vertical-align: middle;
    }

    .loader span {
      width: 6px;
      height: 6px;
      background: var(--text-dim);
      border-radius: 50%;
      opacity: 0.3;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .loader span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loader span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }

    body.embed-mode {
      background: transparent;
      min-height: auto;
    }

    body.embed-mode::before,
    body.embed-mode .page-header {
      display: none;
    }

    body.embed-mode .container {
      padding: 0.75rem 0.5rem 1.5rem;
    }

    body.embed-mode .feed-shell {
      border-top: 0;
      padding-top: 0;
    }

    @media (max-width: 640px) {
      .page-header {
        padding: 0.8rem 1rem;
        position: relative;
      }

      .mobile-page-title {
        display: inline-block;
        font-size: 0.85rem;
        font-weight: 700;
        margin-right: auto;
      }

      .nav-burger {
        align-items: center;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        cursor: pointer;
        display: inline-flex;
        flex: 0 0 auto;
        height: 32px;
        justify-content: center;
        padding: 0;
        width: 32px;
      }

      .nav-links {
        align-items: stretch;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
        display: none;
        flex-direction: column;
        gap: 0.15rem;
        min-width: 160px;
        padding: 0.5rem;
        position: absolute;
        right: 1rem;
        top: calc(100% + 6px);
        z-index: 30;
      }

      .nav-links.open {
        display: flex;
      }

      .nav-links a {
        padding: 0.6rem 0.7rem;
      }

      .container {
        padding: 1rem 0.75rem 2rem;
      }

      .intro {
        align-items: start;
        flex-direction: column;
      }

      .intro-actions {
        width: 100%;
      }

      .user-group .community-badge-label {
        display: none;
      }

      .user-group-pill {
        justify-content: center;
        min-width: 0;
      }

      .user-group-links {
        flex-wrap: wrap;
      }

      .cache-pill {
        justify-content: flex-end;
        min-width: 0;
        text-align: right;
      }

      .post-body {
        padding-left: 0.68rem;
        padding-right: 0.68rem;
      }

      .post-body .post-meta > .community-badge {
        display: none;
      }

      .post-body .post-meta > .pinned-badge {
        margin-left: auto;
      }

      .post-body > .community-badge-mobile {
        display: inline-flex;
        margin: 0 0 0.45rem;
        width: max-content;
      }

      .post-meta .post-link {
        margin-left: auto;
      }

      .post-meta > .pinned-badge + .post-link {
        margin-left: 0;
      }

      .post-card.has-media {
        display: grid;
        grid-template-columns: minmax(92px, 34%) minmax(0, 1fr);
      }

      .post-media {
        border-bottom: 0;
        border-right: 1px solid rgba(46, 46, 62, 0.62);

      .post-media.is-portrait img,

      .viewer-panel {

        display: block;
      }

      .post-media {
        border-bottom: 1px solid rgba(46, 46, 62, 0.62);
        border-right: 0;

    }

  <script>
    (function() {
      var params = new URLSearchParams(location.search);
      if (params.has('embed')) {
        document.body.classList.add('embed-mode');
        if (params.get('bg') === 'transparent') {
          document.body.style.background = 'transparent';
        }

  </script>

  <script>
    (function() {
      var feed = document.getElementById('feed');
      var state = document.getElementById('feed-state');
      var cacheLabel = document.getElementById('cache-label');
      var loadMore = document.getElementById('load-more');
      var mediaViewer = document.getElementById('media-viewer');
      var viewerPanel = mediaViewer.querySelector('.viewer-panel');
      var viewerStage = document.getElementById('viewer-stage');
      var viewerDetails = document.getElementById('viewer-details');
      var viewerClose = document.getElementById('viewer-close');
      var MAX_ITEMS = 150;
      var INITIAL_ITEMS = 30;
      var PAGE_SIZE = 30;
      var allItems = [];
      var pinnedItems = [];
      var renderedCount = 0;

      loadMore.addEventListener('click', function() {
        renderNextItems(PAGE_SIZE);
      });
      viewerClose.addEventListener('click', closeMediaViewer);
      mediaViewer.addEventListener('click', function(event) {
        if (event.target === mediaViewer) {
          closeMediaViewer();
        }
      });
      document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape' && !mediaViewer.hidden) {
          closeMediaViewer();
        }
      });

      Promise.allSettled([
        fetchJson('x-posts.json').then(normalizeXCache),
        fetchJson('curator-posts.json').then(normalizeCuratorCache),
        fetchJson('pinned-posts.json').then(normalizePinnedCache)
      ]).then(function(results) {
        var caches = results
          .filter(function(result) { return result.status === 'fulfilled'; })
          .map(function(result) { return result.value; });
        var feedCaches = caches.filter(function(cache) { return cache.source !== 'pinned'; });
        var pinnedCache = caches.find(function(cache) { return cache.source === 'pinned'; });

        pinnedItems = pinnedCache ? pinnedCache.items : [];

        allItems = feedCaches
          .reduce(function(items, cache) { return items.concat(cache.items); }, [])
          .sort(compareItems)
          .slice(0, MAX_ITEMS);

        updateCacheLabel(feedCaches);

        if (!pinnedItems.length && !allItems.length) {
          showEmpty();
          return;
        }

        renderFeed();
      }).catch(function() {
        showEmpty();
      });

      function fetchJson(url) {
        return fetch(url, { cache: 'no-cache' }).then(function(response) {
          if (!response.ok) {
            throw new Error(url + ' returned ' + response.status);
          }
          return response.json();
        });
      }

      function normalizeXCache(cache) {
        var posts = Array.isArray(cache.posts) ? cache.posts : [];
        return {
          source: 'x',
          updatedAt: cache.updated_at || null,
          items: posts.map(function(post) {
            return {
              id: 'x-' + post.id,
              source: 'x',
              sourceLabel: 'X',
              accent: '#f07040',
              author: '@aiAgentSquid',
              authorUrl: 'https://x.com/aiAgentSquid',
              createdAt: post.created_at || null,
              text: displayText(post.text || ''),
              url: post.url || ('https://x.com/aiAgentSquid/status/' + post.id),
              entities: post.entities || null,
              media: normalizeMedia(post.media)
            };
          })
        };
      }

      function normalizeCuratorCache(cache) {
        var posts = Array.isArray(cache.posts) ? cache.posts : [];
        return {
          source: 'curator',
          updatedAt: cache.updated_at || null,
          items: posts.map(function(post) {
            var network = post.network_name || 'Community';
            var media = post.media || {};
            var tiktokEmbedUrl = tiktokPlayerUrl(post, network);
            return {
              id: 'curator-' + post.id,
              source: 'curator',
              sourceLabel: network,
              accent: sourceColor(network),
              author: authorName(post),
              authorUrl: authorUrl(post),
              title: postTitle(post),
              createdAt: post.created_at || null,
              text: displayText(post.text || ''),
              url: post.url || null,
              community: communityBadge(post, network),
              entities: null,
              markdown: isRedditNetwork(network),
              media: normalizeMedia({
                type: tiktokEmbedUrl ? 'embed' : media.video ? 'video' : 'image',
                url: tiktokEmbedUrl || media.video || media.image_large || media.image || media.thumbnail || null,
                poster: media.image_large || media.image || media.thumbnail || null,
                width: media.video_width || media.image_width || null,
                height: media.video_height || media.image_height || null,
                title: tiktokEmbedUrl ? 'TikTok video player' : null
              })
            };
          })
        };
      }

      function normalizePinnedCache(cache) {
        var normalized = normalizeCuratorCache(cache);
        normalized.source = 'pinned';
        normalized.items.forEach(function(item) {
          item.pinned = true;
        });
        return normalized;
      }

      function renderFeed() {
        renderedCount = 0;
        feed.replaceChildren();
        feed.hidden = false;
        state.hidden = true;
        renderPinnedItems();
        renderNextItems(INITIAL_ITEMS);
      }

      function renderPinnedItems() {
        var fragment = document.createDocumentFragment();
        pinnedItems.forEach(function(item) {
          fragment.appendChild(renderItem(item));
        });
        feed.appendChild(fragment);
      }

      function renderNextItems(count) {
        var fragment = document.createDocumentFragment();
        var nextItems = allItems.slice(renderedCount, renderedCount + count);
        nextItems.forEach(function(item) {
          fragment.appendChild(renderItem(item));
        });

        renderedCount += nextItems.length;
        feed.appendChild(fragment);
        updateLoadMore();
        requestAnimationFrame(updateExpandablePosts);
      }

      function updateLoadMore() {
        var remaining = allItems.length - renderedCount;
        loadMore.hidden = remaining <= 0;
        if (remaining > 0) {
          loadMore.textContent = 'Load more (' + remaining + ')';
        }
      }

      function renderItem(item) {
        var wrapper = document.createElement('article');
        wrapper.className = 'feed-item';
        wrapper.dataset.source = item.source;
        wrapper.style.setProperty('--item-accent', item.accent);

        var card = document.createElement('div');
        card.className = 'post-card';

        if (item.media && item.media.url) {
          card.classList.add('has-media');
          card.appendChild(renderMedia(item));
        }

        var body = document.createElement('div');
        body.className = 'post-body';

        var meta = document.createElement('div');
        meta.className = 'post-meta';
        meta.appendChild(serviceIcon(item.sourceLabel));
        if (item.author) {
          appendAuthor(meta, item);
        }
        var postTime = formatRelativeTime(item.createdAt);
        if (postTime) {
          appendTextSpan(meta, 'post-time', postTime);
        }
        appendCommunityBadge(meta, item);
        if (item.pinned) {
          appendPinnedBadge(meta);
        }
        if (item.url) {
          var link = document.createElement('a');
          link.className = 'post-link';
          link.href = item.url;
          link.target = '_blank';
          link.rel = 'noopener';
          link.setAttribute('aria-label', 'Open post');
          link.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 17L17 7"></path><path d="M8 7h9v9"></path></svg>';
          meta.appendChild(link);
        }
        body.appendChild(meta);
        appendCommunityBadge(body, item, 'community-badge-mobile');

        var text = document.createElement('div');
        text.className = 'post-text';
        if (item.title) {
          var title = item.url ? document.createElement('a') : document.createElement('div');
          title.className = 'post-title';
          title.textContent = item.title;
          if (item.url) {
            title.href = item.url;
            title.target = '_blank';
            title.rel = 'noopener';
          }
          body.appendChild(title);
        }
        appendPostText(text, item);
        body.appendChild(text);

        var more = document.createElement('button');
        more.className = 'post-more';
        more.type = 'button';
        more.textContent = 'Show more';
        more.setAttribute('aria-expanded', 'false');
        more.addEventListener('click', function() {
          var expanded = text.classList.toggle('is-expanded');
          more.textContent = expanded ? 'Show less' : 'Show more';
          more.setAttribute('aria-expanded', String(expanded));
        });
        body.appendChild(more);

        card.appendChild(body);
        wrapper.appendChild(card);
        return wrapper;
      }

      function renderMedia(item) {
        var mediaWrapper = document.createElement('button');
        mediaWrapper.className = 'post-media';
        mediaWrapper.type = 'button';
        mediaWrapper.setAttribute('aria-label', item.media.type === 'image' ? 'Open image' : 'Open media player');
        mediaWrapper.addEventListener('click', function() {
          openMediaViewer(item);
        });

        if (isPortraitMedia(item.media)) {
          mediaWrapper.classList.add('is-portrait');
        }

        var previewUrl = item.media.type === 'image'
          ? item.media.url
          : item.media.poster || null;

        if (previewUrl) {
          var image = document.createElement('img');
          image.src = previewUrl;
          image.alt = item.media.alt || '';
          image.loading = 'lazy';
          mediaWrapper.appendChild(image);
        } else {
          var placeholder = document.createElement('div');
          placeholder.className = 'media-placeholder';
          placeholder.appendChild(serviceIcon(item.sourceLabel));
          mediaWrapper.appendChild(placeholder);
        }

        if (item.media.type !== 'image') {
          var play = document.createElement('span');
          play.className = 'media-play';
          play.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7L8 5Z"></path></svg>';
          mediaWrapper.appendChild(play);
        }

        var expand = document.createElement('span');
        expand.className = 'media-expand';
        expand.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3H3v5"></path><path d="M3 3l7 7"></path><path d="M16 21h5v-5"></path><path d="M21 21l-7-7"></path></svg>';
        mediaWrapper.appendChild(expand);
        return mediaWrapper;
      }

      function openMediaViewer(item) {
        viewerPanel.classList.toggle('is-text-primary', item.markdown);
        viewerStage.replaceChildren(renderViewerMedia(item));
        viewerDetails.replaceChildren(renderViewerDetails(item));
        mediaViewer.hidden = false;
        document.body.classList.add('media-viewer-open');
        viewerClose.focus();
      }

      function closeMediaViewer() {
        mediaViewer.hidden = true;
        document.body.classList.remove('media-viewer-open');
        viewerPanel.classList.remove('is-text-primary');
        viewerStage.replaceChildren();
        viewerDetails.replaceChildren();
      }

      function renderViewerMedia(item) {
        if (item.media.type === 'embed') {
          var iframe = document.createElement('iframe');
          iframe.src = item.media.url;
          iframe.title = item.media.title || 'Embedded media player';
          iframe.allowFullscreen = true;
          iframe.allow = 'fullscreen; encrypted-media; picture-in-picture';
          iframe.referrerPolicy = 'strict-origin-when-cross-origin';
          return iframe;
        }

        if (item.media.type === 'video') {
          var video = document.createElement('video');
          video.controls = true;
          video.preload = 'metadata';
          video.playsInline = true;
          video.src = item.media.url;
          if (item.media.poster) video.poster = item.media.poster;
          return video;
        }

        var image = document.createElement('img');
        image.src = item.media.url;
        image.alt = item.media.alt || '';
        return image;
      }

      function renderViewerDetails(item) {
        var details = document.createElement('div');

        var meta = document.createElement('div');
        meta.className = 'post-meta';
        meta.appendChild(serviceIcon(item.sourceLabel));
        if (item.author) {
          appendAuthor(meta, item);
        }
        var postTime = formatRelativeTime(item.createdAt);
        if (postTime) {
          appendTextSpan(meta, 'post-time', postTime);
        }
        appendCommunityBadge(meta, item);
        if (item.pinned) {
          appendPinnedBadge(meta);
        }
        if (item.url) {
          var link = document.createElement('a');
          link.className = 'post-link';
          link.href = item.url;
          link.target = '_blank';
          link.rel = 'noopener';
          link.setAttribute('aria-label', 'Open post');
          link.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 17L17 7"></path><path d="M8 7h9v9"></path></svg>';
          meta.appendChild(link);
        }
        details.appendChild(meta);

        if (item.title) {
          var title = document.createElement('div');
          title.className = 'post-title';
          title.textContent = item.title;
          details.appendChild(title);
        }

        var text = document.createElement('div');
        text.className = 'post-text';
        appendPostText(text, item);
        details.appendChild(text);
        return details;
      }

      function isPortraitMedia(media) {
        return Number(media.height) > Number(media.width);
      }

      function updateExpandablePosts() {
        Array.prototype.slice.call(feed.querySelectorAll('.post-text')).forEach(function(text) {
          var more = text.nextElementSibling;
          if (!more || !more.classList.contains('post-more')) return;

          text.classList.add('is-collapsible');

          if (text.scrollHeight > text.clientHeight + 1) {
            more.classList.add('is-visible');
          } else {
            text.classList.remove('is-collapsible');
            more.remove();
          }
        });
      }

      function appendPostText(parent, item) {
        if (item.markdown) {
          appendMarkdownText(parent, item.text);
          return;
        }

        appendLinkedText(parent, item.text, item.entities);
      }

      function appendLinkedText(parent, text, entities) {
        var renderedText = expandedEntityText(text, entities);
        if (!renderedText) {
          parent.textContent = 'No text available.';
          return;
        }

        renderedText.split(/\n{2,}/).forEach(function(paragraphText) {
          var paragraph = document.createElement('span');
          paragraph.className = 'post-text-paragraph';
          appendInlineLinkedText(paragraph, paragraphText);
          parent.appendChild(paragraph);
        });
      }

      function appendMarkdownText(parent, text) {
        var renderedText = String(text || '').replace(/\r\n?/g, '\n').trim();
        if (!renderedText) {
          parent.textContent = 'No text available.';
          return;
        }

        renderedText.split(/\n{2,}/).forEach(function(block) {
          appendMarkdownBlock(parent, block);
        });
      }

      function appendMarkdownBlock(parent, block) {
        var lines = block.split('\n').filter(function(line) { return line.trim(); });
        if (!lines.length) return;

        var heading = lines.length === 1 && lines[0].match(/^(#{1,6})\s+(.+)$/);
        if (heading) {
          var headingNode = document.createElement('h3');
          headingNode.className = 'post-md-heading';
          appendMarkdownInline(headingNode, heading[2]);
          parent.appendChild(headingNode);
          return;
        }

        if (lines.every(function(line) { return /^[-*+]\s+/.test(line); })) {
          var list = document.createElement('ul');
          list.className = 'post-md-list';
          lines.forEach(function(line) {
            var item = document.createElement('li');
            appendMarkdownInline(item, line.replace(/^[-*+]\s+/, ''));
            list.appendChild(item);
          });
          parent.appendChild(list);
          return;
        }

        var paragraph = document.createElement('span');
        paragraph.className = 'post-text-paragraph';
        appendMarkdownInline(paragraph, block);
        parent.appendChild(paragraph);
      }

      function appendMarkdownInline(parent, text) {
        var matcher = /(\[([^\]]*)\]\((https?:\/\/[^)\s]+)\)|https?:\/\/[^\s)]+|`([^`]+)`|\*\*([^*]+)\*\*)/g;
        var lastIndex = 0;
        var match;
        var remaining = String(text || '');

        while ((match = matcher.exec(remaining))) {
          if (match.index > lastIndex) {
            parent.appendChild(document.createTextNode(remaining.slice(lastIndex, match.index)));
          }

          if (match[3]) {
            appendLink(parent, match[3], match[2] || match[3].replace(/^https?:\/\//, ''));
          } else if (match[0].startsWith('http')) {
            appendLink(parent, match[0], match[0].replace(/^https?:\/\//, ''));
          } else if (match[4]) {
            var code = document.createElement('code');
            code.className = 'post-md-code';
            code.textContent = match[4];
            parent.appendChild(code);
          } else if (match[5]) {
            var strong = document.createElement('strong');
            strong.textContent = match[5];
            parent.appendChild(strong);
          }

          lastIndex = matcher.lastIndex;
        }

        if (lastIndex < remaining.length) {
          parent.appendChild(document.createTextNode(remaining.slice(lastIndex)));
        }
      }

      function expandedEntityText(text, entities) {
        var urls = entities && Array.isArray(entities.urls) ? entities.urls : [];
        var replacements = urls
          .filter(function(url) { return url.url; })
          .sort(function(a, b) { return b.url.length - a.url.length; });

        var remaining = String(text || '');

        replacements.forEach(function(url) {
          remaining = remaining.replace(url.url, url.expanded_url || url.display_url || url.url);
        });

        return remaining;
      }

      function appendInlineLinkedText(parent, text) {
        var matcher = /(https?:\/\/[^\s]+)/g;
        var lastIndex = 0;
        var match;
        var remaining = String(text || '');

        while ((match = matcher.exec(remaining))) {
          if (match.index > lastIndex) {
            parent.appendChild(document.createTextNode(remaining.slice(lastIndex, match.index)));
          }
          appendLink(parent, match[0], match[0].replace(/^https?:\/\//, ''));
          lastIndex = matcher.lastIndex;
        }

        if (lastIndex < remaining.length) {
          parent.appendChild(document.createTextNode(remaining.slice(lastIndex)));
        }
      }

      function updateCacheLabel(caches) {
        var dates = caches
          .map(function(cache) { return cache.updatedAt ? new Date(cache.updatedAt) : null; })
          .filter(function(date) { return date && !Number.isNaN(date.getTime()); })
          .sort(function(a, b) { return b - a; });

        cacheLabel.textContent = dates.length
          ? 'Updated ' + formatRelativeTime(dates[0].toISOString())
          : 'Updates every 4h';
      }

      function showEmpty() {
        cacheLabel.textContent = 'Updates every 4h';
        feed.hidden = true;
        loadMore.hidden = true;
        state.hidden = false;
        state.textContent = 'Posts are not available yet.';
      }

      function authorName(post) {
        var user = post.user || {};
        if (user.screen_name) return '@' + displayScreenName(user.screen_name);
        return user.full_name || null;
      }

      function displayScreenName(value) {
        var screenName = String(value || '');
        return screenName.toLowerCase() === 'aiagentsquid' ? 'aiAgentSquid' : screenName;
      }

      function displayText(value) {
        return String(value || '')
          .replace(/@aiagentsquid\b/gi, '@aiAgentSquid')
          .replace(/\baiagentsquid\b/g, 'aiAgentSquid');
      }

      function authorUrl(post) {
        var user = post.user || {};
        return user.url || null;
      }

      function postTitle(post) {
        if (!isRedditNetwork(post.network_name)) return null;

        var user = post.user || {};
        return user.full_name || null;
      }

      function communityBadge(post, network) {
        if (!isRedditNetwork(network)) return null;

        var subreddit = subredditName(post.url);
        if (!subreddit) return null;

        return {
          label: 'r/' + subreddit,
          url: 'https://reddit.com/r/' + encodeURIComponent(subreddit)
        };
      }

      function subredditName(url) {
        var match = String(url || '').match(/reddit\.com\/r\/([^/?#]+)/i);
        return match ? decodeURIComponent(match[1]) : null;
      }

      function isRedditNetwork(network) {
        return String(network || '').toLowerCase().includes('reddit');
      }

      function isTikTokNetwork(network) {
        return String(network || '').toLowerCase().includes('tiktok');
      }

      function tiktokPlayerUrl(post, network) {
        var videoId = post && post.source_identifier ? String(post.source_identifier) : '';
        if (!videoId || !isTikTokNetwork(network) || !/^\d+$/.test(videoId)) return null;
        return 'https://www.tiktok.com/player/v1/' + encodeURIComponent(videoId) + '?rel=0';
      }

      function appendLink(parent, url, label) {
        var link = document.createElement('a');
        link.href = url;
        link.target = '_blank';
        link.rel = 'noopener';
        link.textContent = label || url;
        parent.appendChild(link);
      }

      function sourceColor(network) {
        var key = String(network || '').toLowerCase();
        if (key.includes('reddit')) return '#ff875f';
        if (key.includes('instagram')) return '#f5a060';
        if (key.includes('tiktok')) return '#f0a060';
        return '#d07840';
      }

      function compareItems(a, b) {
        var aTime = Date.parse(a.createdAt || '') || 0;
        var bTime = Date.parse(b.createdAt || '') || 0;
        return bTime - aTime;
      }

      function formatRelativeTime(value) {
        var date = new Date(value);
        if (!value || Number.isNaN(date.getTime())) return '';

        var deltaSeconds = Math.round((Date.now() - date.getTime()) / 1000);
        var abs = Math.abs(deltaSeconds);
        var units = [
          ['year', 31536000],
          ['month', 2592000],
          ['week', 604800],
          ['day', 86400],
          ['hour', 3600],
          ['minute', 60]
        ];

        for (var i = 0; i < units.length; i += 1) {
          var unit = units[i][0];
          var seconds = units[i][1];
          if (abs >= seconds) {
            return new Intl.RelativeTimeFormat('en', { numeric: 'auto' }).format(
              -Math.round(deltaSeconds / seconds),
              unit
            );
          }
        }

        return 'just now';
      }

      function appendTextSpan(parent, className, text) {
        var span = document.createElement('span');
        if (className) span.className = className;
        span.textContent = text;
        parent.appendChild(span);
      }

      function appendAuthor(parent, item) {
        if (item.authorUrl) {
          var link = document.createElement('a');
          link.className = 'post-author';
          link.href = item.authorUrl;
          link.target = '_blank';
          link.rel = 'noopener';
          link.textContent = item.author;
          parent.appendChild(link);
          return;
        }

        appendTextSpan(parent, 'post-author', item.author);
      }

      function appendCommunityBadge(parent, item, extraClass) {
        if (!item.community) return;

        var link = document.createElement('a');
        link.className = extraClass ? 'community-badge ' + extraClass : 'community-badge';
        link.href = item.community.url;
        link.target = '_blank';
        link.rel = 'noopener';

        if (item.community.prefix) {
          var prefix = document.createElement('span');
          prefix.className = 'community-badge-label';
          prefix.textContent = item.community.prefix;
          link.appendChild(prefix);
        }

        var label = document.createElement('span');
        label.textContent = item.community.label;
        link.appendChild(label);

        parent.appendChild(link);
      }

      function appendPinnedBadge(parent) {
        var badge = document.createElement('span');
        badge.className = 'pinned-badge';
        badge.title = 'Pinned';
        badge.setAttribute('aria-label', 'Pinned');
        badge.innerHTML = '<svg viewBox="0 0 32 32" fill="currentColor" aria-hidden="true"><path d="M25 21v1H8v-1l2-2L11 4L9 2V1h15v1l-2 2l1 15l2 2zM16 31h1l1-8h-3l1 8z"></path></svg>';
        parent.appendChild(badge);
      }

      function normalizeMedia(media) {
        if (!media || !media.url) return null;
        return {
          type: media.type === 'embed' ? 'embed' : media.type === 'video' ? 'video' : 'image',
          url: media.url,
          poster: media.poster || null,
          title: media.title || null,
          alt: media.alt || '',
          width: media.width || null,
          height: media.height || null
        };
      }

      function serviceIcon(sourceLabel) {
        var span = document.createElement('span');
        span.className = 'service-icon service-icon-' + serviceKey(sourceLabel);
        span.setAttribute('aria-label', sourceLabel || 'Source');
        span.title = sourceLabel || 'Source';
        span.innerHTML = serviceIconSvg(sourceLabel);
        return span;
      }

      function serviceKey(sourceLabel) {
        var key = String(sourceLabel || '').toLowerCase();
        if (key.includes('reddit')) return 'reddit';
        if (key.includes('instagram')) return 'instagram';
        if (key.includes('tiktok')) return 'tiktok';
        return 'x';
      }

      function serviceIconSvg(sourceLabel) {
        var key = String(sourceLabel || '').toLowerCase();
        if (key.includes('reddit')) {
          return '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2.5c1.36 0 2.61.34 3.7.94l1.53-2.24 3.6.78-.34 1.55-2.72-.59-1.02 1.5a8.1 8.1 0 0 1 2.55 3.16A2.7 2.7 0 0 1 24 10.03c0 1.05-.6 1.96-1.48 2.4.02.2.03.4.03.61 0 4.24-4.72 7.68-10.55 7.68S1.45 17.28 1.45 13.04c0-.21.01-.41.03-.61A2.7 2.7 0 0 1 0 10.03a2.7 2.7 0 0 1 4.7-1.82C6.07 4.85 8.83 2.5 12 2.5Zm-3.5 9.2a1.45 1.45 0 1 0 0-2.9 1.45 1.45 0 0 0 0 2.9Zm7 0a1.45 1.45 0 1 0 0-2.9 1.45 1.45 0 0 0 0 2.9Zm-7.2 3.37c.84.9 2.08 1.35 3.7 1.35s2.86-.45 3.7-1.35a.65.65 0 0 0-.95-.89c-.57.61-1.49.92-2.75.92s-2.18-.31-2.75-.92a.65.65 0 1 0-.95.89Z"/></svg>';
        }
        if (key.includes('instagram')) {
          return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5"></rect><circle cx="12" cy="12" r="4"></circle><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"></circle></svg>';
        }
        if (key.includes('tiktok')) {
          return '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M15.4 3c.28 2.32 1.58 3.7 3.6 4.03v3.19a7.3 7.3 0 0 1-3.54-1.08v6.12c0 3.02-2.09 5.24-5.25 5.24-2.82 0-5.21-1.84-5.21-4.84 0-3.45 3.28-5.53 6.42-4.72v3.3c-1.45-.45-3.08.18-3.08 1.72 0 1.08.82 1.75 1.88 1.75 1.2 0 1.94-.73 1.94-2.35V3h3.24Z"/></svg>';
        }
        return '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.24 3h3.31l-7.23 8.26L22.82 21h-6.65l-5.2-6.8L5.02 21H1.7l7.73-8.84L1.28 3h6.82l4.7 6.21L18.24 3Zm-1.16 16.28h1.84L7.1 4.63H5.13l11.95 14.65Z"/></svg>';
      }

    })();
  </script>
  <script src="nav-toggle.js"></script>
</body>
