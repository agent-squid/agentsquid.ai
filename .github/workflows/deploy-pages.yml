name: Deploy Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SITE_URL: "https://agentsquid.ai"
      X_USER_ID: "2057287182851645440"
      MAX_X_POSTS: "50"
      CURATOR_PAGE_SIZE: "25"
      MAX_CURATOR_POSTS: "100"

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build static site
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          CURATOR_FEED_ID: ${{ secrets.CURATOR_FEED_ID }}
        run: |
          mkdir _site
          cp index.html index1.html community.html nav-toggle.js insights.json pinned-posts.json CNAME agent_squid_400.png agent_squid_400x400.png _site/
          cp -r blog _site/blog
          cp -r docs _site/docs

          curl --fail --silent --show-error --location \
            "$SITE_URL/x-posts.json" \
            --output _site/x-posts.json || true
          curl --fail --silent --show-error --location \
            "$SITE_URL/curator-posts.json" \
            --output _site/curator-posts.json || true

          node scripts/fetch-x-posts.mjs
          node scripts/fetch-curator-posts.mjs

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v5
