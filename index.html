<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Squid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #0a0a0f;
      color: #f0ece4;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Subtle radial glow behind the logo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 45%, rgba(220, 90, 40, 0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      user-select: none;
    }

    .logo-wrap {
      position: relative;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid rgba(240, 112, 64, 0.5);
      box-shadow: 0 0 0 6px rgba(240, 112, 64, 0.12), 0 8px 40px rgba(220, 90, 40, 0.4);
      animation: float 4s ease-in-out infinite;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-12px); }
    }

    .wordmark {
      font-size: clamp(2rem, 6vw, 3.4rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      text-align: center;
      line-height: 1.1;
      background: linear-gradient(135deg, #f07040 0%, #f5a060 50%, #e84c1e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="squid_400x400.jpg" alt="Agent Squid logo" />
    </div>
    <div class="wordmark">agent<br>squid</div>
  </div>
</body>
</html>
